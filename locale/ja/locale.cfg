[mod-setting-name]
mks-dsl-fallback-overlay-enabled=未対応の研究所も自動着色する
mks-dsl-lab-blinking-disabled=研究所の点滅を控えめにする
mks-dsl-color-pattern-duration=色パターンの長さ (tick 単位)
mks-dsl-color-saturation=色の彩度 (%)
mks-dsl-color-brightness=色の明るさ (%)
mks-dsl-max-updates-per-tick=1 tick 中の最大更新回数
mks-dsl-is-development=開発者モード

[mod-setting-description]
mks-dsl-fallback-overlay-enabled=オンにすると、未対応のModが追加した研究所も 汎用的な発光エフェクトで着色します。 元の見た目のままにしたい場合はオフにしてください。
mks-dsl-lab-blinking-disabled=オンにすると、通常の研究所の点滅アニメーションを控えめにします。 点滅がわずらわしく感じたらオンにしてください。
mks-dsl-color-pattern-duration=色パターンが切り替わるまでの時間です (tick単位)。 色パターンはたくさんの研究所を並べた時に現れます。 （デフォルト: 180 ticks = 60 UPS の環境で 3 秒）
mks-dsl-color-saturation=色の彩度を指定します。 低くするほど色は淡くなりグレーに近づきます。 （デフォルト：100%）
mks-dsl-color-brightness=色の明るさを指定します。 低くするほど色は暗くなります。 （デフォルト：100%）
mks-dsl-max-updates-per-tick=1 tick 内で更新される研究所の最大数です。 増やすほど色の変化がスムーズになります。 減らすほど UPS への負荷が小さくなります。 （デフォルト：500 = 普通 / 50〜100 = 少なめ / 1000〜2000 = 多め）
mks-dsl-is-development=Disco Science Lite の開発者モード
