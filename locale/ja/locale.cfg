[mod-setting-name]
mks-dsl-fallback-overlay-enabled=未対応の研究所も自動着色する
mks-dsl-lab-blinking-disabled=研究所の点滅を控えめにする
mks-dsl-color-pattern-duration=色パターンの長さ (tick 単位)
mks-dsl-rainbow-mode=虹色のカラーパレットを使う
mks-dsl-color-saturation=色の彩度 (%)
mks-dsl-color-brightness=色の明るさ (%)
mks-dsl-color-update-preset=アニメーション品質
mks-dsl-is-development=開発者モード

[mod-setting-description]
mks-dsl-fallback-overlay-enabled=オンにすると、未対応のModが追加した研究所も 汎用的な発光エフェクトで着色します。\n発光エフェクトを消したい場合はオフにしてください。
mks-dsl-lab-blinking-disabled=オンにすると、通常の研究所の点滅アニメーションを控えめにします。\n点滅がわずらわしく感じたらオンにしてください。
mks-dsl-color-pattern-duration=色パターンが切り替わるまでの時間です。\n色パターンは多数の研究所を並べた時に現れます。\n（デフォルト：180 = 60 UPS の環境で 3 秒）
mks-dsl-rainbow-mode=オンにすると、サイエンスパックの色ではなく虹色のカラーパレットを着色に使います。
mks-dsl-color-saturation=色の彩度を指定します。\n低くするほど色は淡くなりグレーに近づきます。\n（デフォルト：100%）
mks-dsl-color-brightness=色の明るさを指定します。\n低くするほど色は暗くなります。\n（デフォルト：100%）
mks-dsl-color-update-preset=研究所の色アニメーションの更新頻度を制御します。\n表示中の研究所の数に応じて更新頻度が自動調整されます。\n（デフォルト：バランス）
mks-dsl-is-development=Disco Science Lite の開発者モード

[string-mod-setting]
mks-dsl-color-update-preset-smooth=高品質
mks-dsl-color-update-preset-balanced=バランス
mks-dsl-color-update-preset-performance=軽量

[string-mod-setting-description]
mks-dsl-color-update-preset-smooth=最高品質。更新頻度が高くなるため、研究所が多いと UPS に影響する場合があります。
mks-dsl-color-update-preset-balanced=映像品質とパフォーマンスのバランスが取れた設定。ほとんどの環境に推奨。
mks-dsl-color-update-preset-performance=UPS を優先。大規模な工場向けに更新頻度を積極的に抑えます。
