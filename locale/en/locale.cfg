[mod-setting-description]
mks-dsl-fallback-overlay-enabled=If enabled, any labs added by unsupported mods will also be colorized using a generic glow effect. Disable this if you prefer those labs to keep their original appearance.
mks-dsl-lab-blinking-disabled=If enabled, the blinking animation of vanilla Factorio labs is disabled. Enable this if you find the blinking distracting.
mks-dsl-color-pattern-duration=How long each color pattern is displayed before switching to the next one, in game ticks. The color pattern is most visible when many labs are grouped together. (Default: 180 ticks = 3 seconds at 60 UPS)
mks-dsl-color-saturation=How vivid the lab colors appear. Lower values make the colors closer to gray. (Default: 100%)
mks-dsl-color-brightness=How bright the lab colors appear. Lower values make the colors darker. (Default: 100%)
mks-dsl-color-update-interval=How many ticks between each color update. 1 = updates every tick (smoothest). Higher values update less frequently, reducing UPS impact at the cost of animation smoothness. (Default: 1)
mks-dsl-is-development=Whether Development Mode is enabled.
