[mod-setting-name]
mks-dsl-fallback-overlay-enabled=Automatic colorization for unsupported mods
mks-dsl-lab-blinking-disabled=Disable lab blinking
mks-dsl-color-pattern-duration=Color pattern duration (ticks)
mks-dsl-rainbow-mode=Use rainbow color palette
mks-dsl-color-saturation=Color saturation (%)
mks-dsl-color-brightness=Color brightness (%)
mks-dsl-color-update-preset=Animation quality
mks-dsl-is-development=Development Mode

[mod-setting-description]
mks-dsl-fallback-overlay-enabled=If enabled, any labs added by unsupported mods will also be colorized using a generic glow effect.\nDisable this if you prefer those labs to keep their original appearance.
mks-dsl-lab-blinking-disabled=If enabled, the blinking animation of vanilla Factorio labs is disabled.\nEnable this if you find the blinking distracting.
mks-dsl-color-pattern-duration=How long each color pattern is displayed before switching to the next one, in game ticks.\nThe color pattern is most visible when many labs are grouped together.\n(Default: 180 ticks = 3 seconds at 60 UPS)
mks-dsl-rainbow-mode=If enabled, labs will display a rainbow of colors regardless of the science packs being consumed.
mks-dsl-color-saturation=How vivid the lab colors appear.\nLower values make the colors closer to gray.\n(Default: 100%)
mks-dsl-color-brightness=How bright the lab colors appear.\nLower values make the colors darker.\n(Default: 100%)
mks-dsl-color-update-preset=Controls how frequently lab color animations update.\nThe update frequency is automatically adjusted based on the number of visible labs.\n(Default: Balanced)
mks-dsl-is-development=Whether Development Mode is enabled.

[string-mod-setting]
mks-dsl-color-update-preset-smooth=Smooth
mks-dsl-color-update-preset-balanced=Balanced
mks-dsl-color-update-preset-performance=Performance

[string-mod-setting-description]
mks-dsl-color-update-preset-smooth=Best visual quality. Updates more frequently, but may impact UPS with many labs.
mks-dsl-color-update-preset-balanced=Good balance between visual quality and performance. Recommended for most setups.
mks-dsl-color-update-preset-performance=Prioritizes UPS. Reduces update frequency aggressively for large bases.
