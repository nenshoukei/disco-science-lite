[mod-setting-description]
mks-dsl-fallback-overlay-enabled=If checked, any labs added by unsupported mods will also be colorized using a generic glow effect. Disable this if you prefer those labs to keep their original appearance.
mks-dsl-color-pattern-duration=How long each color pattern is displayed before switching to a new one, in game ticks. Higher values mean each pattern lasts longer. (Default: 180 ticks = 3 seconds at 60 UPS)
mks-dsl-color-intensity=How vivid the lab colors appear. Lower values make the colors more subtle. (Default: 100%)
mks-dsl-unison-flicker=If checked, all labs flash in unison. When disabled, labs flicker independently. (Note: With many labs on screen, synchronized flashing may cause intense full-screen strobing, which can be uncomfortable for some players.)
mks-dsl-max-updates-per-tick=Color update budget per tick. If visible labs exceed this value, updates are spread over multiple ticks automatically. Raise if your PC can handle it, lower to reduce CPU load. (low = 50–100, medium = 200, high = 500–2000)
