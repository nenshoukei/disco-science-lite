[mod-setting-name]
mks-dsl-color-pattern-duration=Color pattern duration (ticks)
mks-dsl-color-intensity=Color intensity (%)
mks-dsl-random-flicker=Random flicker
mks-dsl-lab-update-interval=Lab update interval (ticks)

[mod-setting-description]
mks-dsl-color-pattern-duration=How long each color pattern is displayed before switching to a new one, in game ticks. Higher values mean each pattern lasts longer. (Default: 180 ticks = 3 seconds at 60 UPS)
mks-dsl-color-intensity=How vivid the lab colors appear. Lower values make the colors more subtle. (Default: 100%)
mks-dsl-random-flicker=If checked, labs flicker independently. When disabled, all labs flash in unison.
mks-dsl-lab-update-interval=Spreading lab color updates over multiple ticks for better performance. Each lab is updated approximately once every N ticks. Increase this if you have many labs and want to reduce CPU load. (Default: 6)
